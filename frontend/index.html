<!DOCTYPE html>
<html>
<head>
  <title>Notes App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">Notes App</h2>

  <!-- FORM TAMBAH -->
  <div class="card p-3 mb-4 shadow-sm">
    <input id="judul" class="form-control mb-2" placeholder="Judul">
    <textarea id="isi" class="form-control mb-2" placeholder="Isi" ></textarea>
    <button onclick="addNote()" class="btn btn-primary">Tambah</button>
  </div>

  <!-- LIST NOTES -->
  <div id="list" class="row"></div>
</div>

<!-- MODAL EDIT -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-lg"> 
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Note</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <label for="editJudul" class="form-label">Judul</label>
        <input id="editJudul" class="form-control mb-3" placeholder="Masukkan judul...">
        
        <label for="editIsi" class="form-label">Isi Catatan</label>
        <textarea id="editIsi" class="form-control" rows="10" placeholder="Tuliskan isi catatan di sini..."></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button onclick="saveEdit()" class="btn btn-success px-4">Simpan Perubahan</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
