runtime: nodejs20
service: tcc-sarah

handlers:
  - url: /
    static_files: frontend/index.html
    upload: frontend/index.html

  - url: /(.*)
    static_files: frontend/\1
    upload: frontend/(.*)
    
# Tambahkan ini supaya hemat (untuk testing)
automatic_scaling:
  target_cpu_utilization: 0.65
  min_instances: 0
  max_instances: 1